name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx astro build

      # Deploy only runs once the Cloudflare secrets are set on the repo.
      # Creates the Pages project on first run if it doesn't exist yet.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npx wrangler pages project create robertritz-blog \
            --production-branch main 2>/dev/null || true
          npx wrangler pages deploy dist \
            --project-name robertritz-blog --branch main
